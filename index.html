<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRM Pace Manager</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #000;
  color: #fff;
  padding: 10px;
}
input, select, textarea {
  user-select: text !important;
  -webkit-user-select: text !important;
}
.container {
  max-width: 520px;
  margin: auto;
}

/* ヘッダー */
.header {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 8px 16px 8px;
  border-bottom: 1px solid #222; 
  margin-bottom: 10px;
}
.header-title {
  font-family: 'Arial Black', Impact, sans-serif; 
  font-size: 22px; 
  font-style: italic; 
  letter-spacing: 1px; 
  color: #ffffff; 
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
}
.menu-trigger {
  font-size: 24px;
  cursor: pointer;
  padding: 4px 8px;
  color: #ffffff; 
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  flex-shrink: 0;
}

/* メニューエリア */
.menu-content {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 12px;
  border: 1px solid #444;
}
.menu-content.open {
  display: block;
}
.menu-label {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 5px;
  display: block;
}
textarea {
  width: 100%;
  background: #333;
  color: #fff;
  border: 1px solid #555;
  padding: 8px;
  font-size: 13px;
  border-radius: 4px;
  height: 90px;
  resize: none;
}

.menu-input-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  margin-bottom: 12px;
}
.btn-save {
  background: #00aa66;
  color: white;
  border: none;
  padding: 0 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-delete {
  background: #444;
  color: #ff4444;
  border: 1px solid #ff4444;
  padding: 0 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-reset {
  width: 100%;
  background: #ff4444;
  color: white;
  border: none;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 6px;
  margin-top: 10px;
}

/* 共通カードスタイル */
.slim-card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px 12px; 
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.card-center {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.label-center {
  display: block;
  font-size: 13px;
  color: #bbb;
  margin-bottom: 3px;
  text-align: center;
}
.title {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 2px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: #fff;
  text-align: center;
  text-align-last: center; 
}
input[type="datetime-local"] {
  font-size: 13px;
  padding: 11px 4px;
}

.menu-top-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.half {
  flex: 1;
}

.current-time-display {
  font-size: 24px;
  font-weight: bold;
  color: #00e5ff; 
  text-align: center;
}
.value {
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}

/* 進捗グラフエリア */
.progress-section {
  background: #111;
  border-radius: 10px;
  padding: 6px 14px; 
  margin-bottom: 8px;
  border: 1px solid #222;
}
.graph-scale-container {
  position: relative;
  width: 100%;
  height: 52px; 
  margin: auto;
}
.graph-container {
  background-color: #222;
  border-radius: 4px;
  height: 12px;
  width: 100%;
  overflow: hidden;
  position: absolute;
  top: 20px; 
  left: 0;
}
.graph-bar {
  height: 100%;
  width: 0%; 
  background: linear-gradient(90deg, #00aa66 0%, #00ff66 100%);
  border-radius: 4px;
  transition: width 0.4s ease-out;
}

/* 動的目盛りスタイル */
.scale-point {
  font-size: 10px;
  font-weight: bold;
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
  transition: transform 0.2s ease, font-size 0.2s ease, text-shadow 0.2s ease;
}

.scale-point[data-full]::after {
  content: attr(data-full);
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  display: none;
  white-space: nowrap;
  border: 1px solid #555;
  z-index: 10;
}
.scale-point[data-full]:active::after {
  display: block;
}

/* 明滅アニメーション */
@keyframes pulse-pc {
  0% { text-shadow: 0 0 4px #00d2ff; }
  50% { text-shadow: 0 0 14px #00d2ff, 0 0 20px #00d2ff; }
  100% { text-shadow: 0 0 4px #00d2ff; }
}
@keyframes pulse-shop {
  0% { text-shadow: 0 0 4px #00ffaa; }
  50% { text-shadow: 0 0 14px #00ffaa, 0 0 20px #00ffaa; }
  100% { text-shadow: 0 0 4px #00ffaa; }
}

/* ★現在選択・アクティブなチェックポイントの強調定義 */
.scale-point.active-pc {
  font-size: 14px !important;
  transform: translateX(-50%) scale(1.2);
  z-index: 5;
  animation: pulse-pc 1.5s infinite;
}
.scale-point.active-shop {
  font-size: 14px !important;
  transform: translateX(-50%) scale(1.2);
  z-index: 5;
  animation: pulse-shop 1.5s infinite;
}

/* PCチェック用（上・青） */
.scale-point.pc-type {
  top: 2px;
  color: #00d2ff;
}
.scale-point.pc-type::before {
  content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 1px; height: 4px; background-color: #00d2ff;
}
/* コミビニ・休憩用（下・緑） */
.scale-point.shop-type {
  bottom: 2px;
  color: #00ffaa;
}
.scale-point.shop-type::before {
  content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 1px; height: 4px; background-color: #00ffaa;
}
/* START/GOAL（白） */
.scale-point.neutral-type {
  top: 2px;
  color: #ffffff;
}
.scale-point.neutral-type::before {
  content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 1px; height: 4px; background-color: #ffffff;
}

/* 【PC専用】情報枠スタイル（青） */
.full-width-pc-card {
  width: 100%;
  background: #0a192f;      
  border: 1px solid #00d2ff; 
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.pc-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.pc-nav-btn {
  background: #113355;
  color: #00d2ff;
  border: 1px solid #00d2ff;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.pc-nav-btn:active { background: #00d2ff; color: #000; }
.pc-title-label {
  color: #00d2ff;            
  font-size: 15px;           
  font-weight: bold;
  line-height: 1.3;
  text-align: center;
  flex: 1;
  padding: 0 4px;
}
.pc-main-row {
  display: flex;
  justify-content: center; 
  align-items: baseline;
  margin-bottom: 10px;
  border-bottom: 1px dashed rgba(0, 210, 255, 0.3);
  padding-bottom: 6px;
}

/* 【コンビニ・その他専用】情報枠スタイル（緑） */
.full-width-shop-card {
  width: 100%;
  background: #061f14;      
  border: 1px solid #00ffaa; 
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 8px;
}
.shop-nav-btn {
  background: #0d3824;
  color: #00ffaa;
  border: 1px solid #00ffaa;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.shop-nav-btn:active { background: #00ffaa; color: #000; }
.shop-title-label {
  color: #00ffaa;            
  font-size: 15px;           
  font-weight: bold;
  line-height: 1.3;
  text-align: center;
  flex: 1;
  padding: 0 4px;
}
.shop-main-row {
  display: flex;
  justify-content: center; 
  align-items: baseline;
  margin-top: 4px;
  margin-bottom: 4px;
}

/* 速度表示共通グリッド */
.speed-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); 
  gap: 8px 4px; 
  text-align: center;
}
.speed-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.pc-speed-th {
  font-size: 13px; 
  color: #00d2ff;
  font-weight: normal;
  margin-bottom: 2px;
}
.speed-td {
  font-size: 16px; 
  font-weight: bold;
  color: #ffffff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

/* 貯金時間 */
.slim-big-card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px 12px; 
  margin-top: 4px;
}
.big-value {
  font-size: 38px; 
  font-weight: bold;
  text-align: center;
  margin-top: 2px;
  display: block;
  width: 100%;
}

.footer {
  margin-top: 25px;
  margin-bottom: 15px;
  text-align: center;
  font-size: 12px;
  color: #666;
  letter-spacing: 0.5px;
}

.green { color: #00ff66; }
.yellow { color: #ffcc00; }
.red { color: #ff4444; }
.highlight { color: #ffff00; } 
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">BRM PACE MANAGER</div>
    <div class="menu-trigger" id="menuTrigger">☰</div>
  </div>

  <div class="menu-content" id="menuContent">
    <div class="menu-top-row">
      <div class="card-center half" style="background: #333;">
        <label class="label-center" style="color: #fff;">BRM設定</label>
        <select id="brm" style="background: #222;">
          <option value="200,13.5">200km (13.5h)</option>
          <option value="300,20">300km (20h)</option>
          <option value="400,27">400km (27h)</option>
          <option value="600,40">600km (40h)</option>
        </select>
      </div>
      <div class="card-center half" style="background: #333;">
        <label class="label-center" style="color: #fff;">START日時</label>
        <input type="datetime-local" id="startTime" style="background: #222;">
      </div>
    </div>

    <div style="margin-bottom: 10px;">
      <label class="menu-label">① 公式PC・通過チェック リスト登録</label>
      <textarea id="pcInput" placeholder="例:&#10;PC1, 御幸橋, 24.9km&#10;PC2, 山城大橋, 68.0km"></textarea>
    </div>

    <div style="margin-bottom: 12px;">
      <label class="menu-label">② コンビニ・休憩・任意スポット リスト登録</label>
      <textarea id="shopInput" placeholder="例 (区切りは「,」「、」等。km無しでも自動追加):&#10;ローソン 八幡南店, 32.1&#10;セブン 宇治川店, 50.4"></textarea>
    </div>

    <div style="margin-bottom: 10px;">
      <label class="menu-label">現在のリスト一式を保存する</label>
      <div class="menu-input-row">
        <input type="text" id="saveName" placeholder="例: BRM315泉佐野" style="font-size:14px; padding:6px; text-align:left;">
        <button class="btn-save" id="saveBtn">保存</button>
      </div>
    </div>

    <div style="margin-bottom: 15px;">
      <label class="menu-label">保存済みリストの呼び出し / 削除</label>
      <div class="menu-input-row">
        <select id="savedListsSelect" style="font-size:14px; padding:6px; text-align:left; text-align-last:left;">
          <option value="">-- 保存データがありません --</option>
        </select>
        <button class="btn-delete" id="deleteBtn">削除</button>
      </div>
    </div>

    <button class="btn-reset" id="resetBtn">リセット</button>
  </div>

  <div class="grid">
    <div class="slim-card">
      <div class="title">現在距離</div>
      <input type="number" id="distance" step="0.1" inputmode="decimal" style="font-size:24px; color:#00ff66; padding: 2px; text-align: center; background: transparent;">
    </div>
    <div class="slim-card">
      <div class="title">現在時間</div>
      <div id="currentTime" class="current-time-display">--:--:--</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="graph-scale-container" id="graphScale">
      <div class="graph-container">
        <div id="graphBar" class="graph-bar"></div>
      </div>
    </div>
  </div>

  <div class="card full-width-pc-card" id="pcCard">
    <div class="pc-header-row">
      <button class="pc-nav-btn" id="pcPrevBtn">◀ 前</button>
      <div id="pcLabel" class="pc-title-label">NEXT: PC-</div>
      <button class="pc-nav-btn" id="pcNextBtn">次 ▶</button>
    </div>
    
    <div class="pc-main-row">
      <div class="value highlight" id="pcRemainDist" style="font-size:26px; text-align: center; cursor: pointer; padding: 0 20px;">残り -- km</div>
    </div>
    
    <div class="speed-grid">
      <div class="speed-cell"><div class="pc-speed-th">15km/h</div><div class="speed-td" id="pc_sp15">--:--</div></div>
      <div class="speed-cell"><div class="pc-speed-th">16km/h</div><div class="speed-td" id="pc_sp16">--:--</div></div>
      <div class="speed-cell"><div class="pc-speed-th">17km/h</div><div class="speed-td" id="pc_sp17">--:--</div></div>
      <div class="speed-cell"><div class="pc-speed-th">18km/h</div><div class="speed-td" id="pc_sp18">--:--</div></div>
      <div class="speed-cell"><div class="pc-speed-th">19km/h</div><div class="speed-td" id="pc_sp19">--:--</div></div>
      <div class="speed-cell"><div class="pc-speed-th">20km/h</div><div class="speed-td" id="pc_sp20">--:--</div></div>
    </div>
  </div>

  <div class="card full-width-shop-card" id="shopCard">
    <div class="pc-header-row">
      <button class="shop-nav-btn" id="shopPrevBtn">◀ 前</button>
      <div id="shopLabel" class="shop-title-label">NEXT休憩: ---</div>
      <button class="shop-nav-btn" id="shopNextBtn">次 ▶</button>
    </div>
    
    <div class="shop-main-row">
      <div class="value green" id="shopRemainDist" style="font-size:26px; text-align: center; cursor: pointer; padding: 0 20px;">残り -- km</div>
    </div>
  </div>

  <div class="grid">
    <div class="slim-card"><div class="title">経過時間</div><div class="value" id="elapsed">--</div></div>
    <div class="slim-card"><div class="title">残り時間</div><div class="value" id="remainTime">--</div></div>
    <div class="slim-card"><div class="title">グロス速度</div><div class="value" id="gross">--</div></div>
    <div class="slim-card"><div class="title">残り距離</div><div class="value" id="remainDistance">--</div></div>
    <div class="slim-card"><div class="title">完走予想</div><div class="value" id="finish">--</div></div>
    <div class="slim-card"><div class="title">必要平均</div><div class="value" id="needSpeed">--</div></div>
  </div>

  <div class="slim-big-card">
    <div class="title" style="font-size: 15px;">貯金時間</div>
    <div class="big-value" id="saving">--</div>
  </div>

  <div class="footer">
    © 2026 Developed by HIRAI
  </div>

</div>

<script>
const brm = document.getElementById("brm");
const startTime = document.getElementById("startTime");
const distance = document.getElementById("distance");
const pcInput = document.getElementById("pcInput");
const shopInput = document.getElementById("shopInput");
const menuTrigger = document.getElementById("menuTrigger");
const menuContent = document.getElementById("menuContent");
const resetBtn = document.getElementById("resetBtn");

const pcPrevBtn = document.getElementById("pcPrevBtn");
const pcNextBtn = document.getElementById("pcNextBtn");
const pcRemainDist = document.getElementById("pcRemainDist");

const shopPrevBtn = document.getElementById("shopPrevBtn");
const shopNextBtn = document.getElementById("shopNextBtn");
const shopRemainDist = document.getElementById("shopRemainDist");

const graphBar = document.getElementById("graphBar");
const graphScale = document.getElementById("graphScale");

const saveName = document.getElementById("saveName");
const saveBtn = document.getElementById("saveBtn");
const savedListsSelect = document.getElementById("savedListsSelect");
const deleteBtn = document.getElementById("deleteBtn");

const circleNumbers = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];

// デフォルトサンプル
const defaultPCList = "PC1, 御幸橋, 24.9km\nPC2, 山城大橋, 68.0km";
const defaultShopList = "ローソン 八幡南店, 32.1\nセブン 宇治川店, 50.4";

let globalPCList = [];   
let globalShopList = []; 

let pcDisplayIdx = -1; 
let pcAutoTrackIdx = -1;        
let isPcUserNavigating = false; 

let shopDisplayIdx = -1;
let shopAutoTrackIdx = -1;
let isShopUserNavigating = false;

let tempDistanceValue = ""; 

function toHalfWidthAlphaNum(str) {
  return str.replace(/[！-～]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  }).replace(/[\s ]+/g, '').toUpperCase();
}

// ローカルストレージ読込
startTime.value = localStorage.getItem("startTime") || "";
brm.value = localStorage.getItem("brm") || "200,13.5";
distance.value = localStorage.getItem("distance") || "";
pcInput.value = localStorage.getItem("pcList3") || defaultPCList;
shopInput.value = localStorage.getItem("shopList3") || defaultShopList;

menuTrigger.addEventListener("click", () => menuContent.classList.toggle("open"));

distance.addEventListener("focus", () => {
  tempDistanceValue = distance.value; 
  distance.value = ""; 
});

distance.addEventListener("blur", () => {
  if (distance.value === "") {
    distance.value = tempDistanceValue;
    update(false);
  }
});

pcRemainDist.addEventListener("dblclick", () => {
  if (isPcUserNavigating) {
    isPcUserNavigating = false; 
    pcDisplayIdx = pcAutoTrackIdx; 
    update(true); // 強調を再描画するためにupdateを呼ぶ
  }
});

shopRemainDist.addEventListener("dblclick", () => {
  if (isShopUserNavigating) {
    isShopUserNavigating = false;
    shopDisplayIdx = shopAutoTrackIdx;
    update(true);
  }
});

function loadSavedListsDropdown() {
  const savedData = localStorage.getItem("customBRMDataSets3");
  let lists = savedData ? JSON.parse(savedData) : {};
  savedListsSelect.innerHTML = "";
  const keys = Object.keys(lists);
  if (keys.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.innerText = "-- 保存データがありません --";
    savedListsSelect.appendChild(opt);
    return;
  }
  const defaultOpt = document.createElement("option");
  defaultOpt.value = "";
  defaultOpt.innerText = "-- リストを選択して呼び出し --";
  savedListsSelect.appendChild(defaultOpt);
  keys.forEach(key => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.innerText = key;
    savedListsSelect.appendChild(opt);
  });
}

saveBtn.addEventListener("click", () => {
  const name = saveName.value.trim();
  if (!name) { alert("保存する名前を入力してください。"); return; }
  const savedData = localStorage.getItem("customBRMDataSets3");
  let lists = savedData ? JSON.parse(savedData) : {};
  
  lists[name] = {
    pc: pcInput.value.trim(),
    shop: shopInput.value.trim()
  };
  
  localStorage.setItem("customBRMDataSets3", JSON.stringify(lists));
  saveName.value = ""; 
  loadSavedListsDropdown(); 
  alert("セット「" + name + "」を保存しました。");
});

savedListsSelect.addEventListener("change", () => {
  const selectedName = savedListsSelect.value;
  if (!selectedName) return;
  const savedData = localStorage.getItem("customBRMDataSets3");
  let lists = savedData ? JSON.parse(savedData) : {};
  if (lists[selectedName]) {
    const data = lists[selectedName];
    pcInput.value = data.pc || "";
    shopInput.value = data.shop || "";
    isPcUserNavigating = false; 
    isShopUserNavigating = false;
    update(true); 
    alert("「" + selectedName + "」のデータを読み込みました。");
  }
});

deleteBtn.addEventListener("click", () => {
  const selectedName = savedListsSelect.value;
  if (!selectedName) { alert("削除したいリストを選択してください。"); return; }
  if (confirm("リスト「" + selectedName + "」を削除してもよろしいですか？")) {
    const savedData = localStorage.getItem("customBRMDataSets3");
    let lists = savedData ? JSON.parse(savedData) : {};
    delete lists[selectedName];
    localStorage.setItem("customBRMDataSets3", JSON.stringify(lists));
    loadSavedListsDropdown(); 
    alert("削除しました。");
  }
});

// ナビボタンイベント（切り替え時に即座にグラフ目盛りを再レンダリング）
pcPrevBtn.addEventListener("click", () => {
  if (globalPCList.length === 0) return;
  if (pcDisplayIdx > 0) { 
    isPcUserNavigating = true; 
    pcDisplayIdx--; 
    const [targetDistance] = brm.value.split(",").map(Number);
    renderGraphScale(targetDistance);
    updateDisplayOnly(); 
  }
});
pcNextBtn.addEventListener("click", () => {
  if (globalPCList.length === 0) return;
  if (pcDisplayIdx < globalPCList.length - 1) { 
    isPcUserNavigating = true; 
    pcDisplayIdx++; 
    const [targetDistance] = brm.value.split(",").map(Number);
    renderGraphScale(targetDistance);
    updateDisplayOnly();

});

shopPrevBtn.addEventListener("click", () => {
  if (globalShopList.length === 0) return;
  if (shopDisplayIdx > 0) { 
    isShopUserNavigating = true; 
    shopDisplayIdx--; 
    const [targetDistance] = brm.value.split(",").map(Number);
    renderGraphScale(targetDistance);
    updateDisplayOnly(); 
  }
});
shopNextBtn.addEventListener("click", () => {
  if (globalShopList.length === 0) return;
  if (shopDisplayIdx < globalShopList.length - 1) {

    shopDisplayIdx++; 
    const [targetDistance] = brm.value.split(",").map(Number);
    renderGraphScale(targetDistance);
    updateDisplayOnly(); 
  }

function formatArrivalDate(targetDate, startStr) {
  if (!startStr) return "--:--";
  const start = new Date(startStr);
  const hrs = String(targetDate.getHours()).padStart(2, '0');
  const mins = String(targetDate.getMinutes()).padStart(2, '0');
  const isNextDay = targetDate.getDate() !== start.getDate() || targetDate.getMonth() !== start.getMonth();
  if (isNextDay) {
    const dayLabels = ["日", "月", "火", "水", "木", "金", "土"];
    return dayLabels[targetDate.getDay()] + ")" + hrs + ":" + mins;
  }
  return hrs + ":" + mins;
}

function updateDisplayOnly() {
  const currentDist = parseFloat(distance.value) || 0;
  
  let startReady = false;
  let start = null;
  if (startTime.value) {
    start = new Date(startTime.value);
    if (!isNaN(start.getTime())) startReady = true;
  }

  // --- ① PCカード表示 ---
  if (globalPCList.length > 0 && pcDisplayIdx !== -1) {
    const selectedPC = globalPCList[pcDisplayIdx];
    const diffDist = selectedPC.dist - currentDist;
    let prefix = (pcDisplayIdx === pcAutoTrackIdx) ? "NEXT: " : (pcDisplayIdx < pcAutoTrackIdx ? "通過済: " : "先々: ");
    
    let rawDist = selectedPC.dist.toFixed(1);
    document.getElementById("pcLabel").innerText = prefix + selectedPC.id + " " + selectedPC.name + "（" + rawDist + "km）";
    pcRemainDist.innerText = diffDist >= 0 ? "残り " + diffDist.toFixed(1) + " km" : "通過後 " + Math.abs(diffDist).toFixed(1) + " km";

    const speeds = [15, 16, 17, 18, 19, 20];
    speeds.forEach(speed => {
      const el = document.getElementById("pc_sp" + speed);
      if (startReady) {
        const arrivalDate = new Date(start.getTime() + (selectedPC.dist / speed) * 3600000);
        el.innerText = formatArrivalDate(arrivalDate, startTime.value);
      } else { el.innerText = "--:--"; }
    });
  } else {
    document.getElementById("pcLabel").innerText = "NEXT: GOAL";
    pcRemainDist.innerText = "残り 0.0 km";
    ["15","16","17","18","19","20"].forEach(s => document.getElementById("pc_sp" + s).innerText = "--:--");
  }

  // --- ② コンビニ休憩カード表示 ---
  if (globalShopList.length > 0 && shopDisplayIdx !== -1) {
    const selectedShop = globalShopList[shopDisplayIdx];
    const diffDist = selectedShop.dist - currentDist;
    let prefix = (shopDisplayIdx === shopAutoTrackIdx) ? "NEXT休憩: " : (shopDisplayIdx < shopAutoTrackIdx ? "通過済休憩: " : "先々休憩: ");
    
    let rawDist = selectedShop.dist.toFixed(1);
    document.getElementById("shopLabel").innerText = prefix + selectedShop.name + "（" + rawDist + "km）";
    shopRemainDist.innerText = diffDist >= 0 ? "残り " + diffDist.toFixed(1) + " km" : "通過後 " + Math.abs(diffDist).toFixed(1) + " km";
  } else {
    document.getElementById("shopLabel").innerText = "NEXT休憩: 登録なし";
    shopRemainDist.innerText = "残り -- km";
  }
}

// グラフ目盛りの描画（★現在選択インデックスに合わせたクラス付与ロジックを追加）
function renderGraphScale(targetDistance) {
  const items = graphScale.querySelectorAll(".scale-point");
  items.forEach(el => el.remove());

  createScalePoint(0, "START", "neutral-type", "START", false);
  createScalePoint(100, "GOAL", "neutral-type", "GOAL", false);

  // 1. PCチェックの描画
  let lastPctPC = 0;
  globalPCList.forEach((p, idx) => {
    if (p.dist < targetDistance) {
      const pct = (p.dist / targetDistance) * 100;
      let label = p.id;
      // 現在カードで選択されているポイントかどうかを判定
      const isActive = (idx === pcDisplayIdx); 
      
      let typeClass = "pc-type";
      if (isActive) typeClass += " active-pc";

      if (pct - lastPctPC < 5 && pct > 0 && !isActive) {
        createScalePoint(pct, "・", typeClass, label, isActive);
      } else {
        createScalePoint(pct, label, typeClass, label, isActive);
        lastPctPC = pct;
      }
    }
  });

  // 2. コンビニ休憩の描画
  let lastPctShop = 0;
  globalShopList.forEach((s, idx) => {
    if (s.dist < targetDistance) {
      const pct = (s.dist / targetDistance) * 100;
      let label = s.id;
      // 現在カードで選択されているポイントかどうかを判定
      const isActive = (idx === shopDisplayIdx);

      let typeClass = "shop-type";
      if (isActive) typeClass += " active-shop";

      if (pct - lastPctShop < 5 && pct > 0 && !isActive) {
        createScalePoint(pct, "・", typeClass, label, isActive);
      } else {
        createScalePoint(pct, label, typeClass, label, isActive);
        lastPctShop = pct;
      }
    }
  });
}

function createScalePoint(leftPct, label, className, fullText, isActive) {
  const div = document.createElement("div");
  div.className = "scale-point " + className;
  div.style.left = leftPct + "%";
  div.innerText = label;
  // 被り回避で「・」になっていても、現在選択中なら強制的にテキストを復元して読めるようにする
  if (isActive && fullText) {
    div.innerText = fullText;
  }
  if (label === "・" && fullText) {
    div.setAttribute("data-full", fullText);
  }
  graphScale.appendChild(div);
}

function parseTextList(textData, isPCMode = false) {
  const lines = textData.split("\n").filter(line => line.trim() !== "");
  const tempResult = [];
  
  for (let line of lines) {
    const columns = line.split(/[,,、，]/).map(c => c.trim());
    if (columns.length < 2) continue;
    
    let idOrName = columns[0];
    let secondVal = columns[1];
    let distStr = (isPCMode && columns.length >= 3) ? columns[2] : secondVal;
    const itemDist = parseFloat(distStr.replace(/[^\d.]/g, ""));
    
    if (!isNaN(itemDist)) {
      if (isPCMode && columns.length >= 3) {
        tempResult.push({ rawId: idOrName, name: secondVal, dist: itemDist });
      } else {
        tempResult.push({ rawId: "", name: idOrName, dist: itemDist });
      }
    }
  }
  
  tempResult.sort((a, b) => a.dist - b.dist);
  let genericCounter = 0;

  return tempResult.map(item => {
    let finalId = "";
    if (isPCMode) {
      let cleanId = toHalfWidthAlphaNum(item.rawId);
      if (cleanId.startsWith("PC")) {
        finalId = cleanId; 
      } else {
        finalId = circleNumbers[genericCounter] || `(${genericCounter + 1})`;
        genericCounter++;
      }
    } else {
      finalId = circleNumbers[genericCounter] || `(${genericCounter + 1})`;
      genericCounter++;
    }
    return { id: finalId, name: item.name, dist: item.dist };
  });
}

function update(isDistanceOrInputChanged = false) {
  localStorage.setItem("startTime", startTime.value);
  localStorage.setItem("brm", brm.value);
  localStorage.setItem("distance", distance.value);
  localStorage.setItem("pcList3", pcInput.value);
  localStorage.setItem("shopList3", shopInput.value);

  const now = new Date();
  const hrs = String(now.getHours()).padStart(2, '0');
  const mins = String(now.getMinutes()).padStart(2, '0');
  const secs = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("currentTime").innerText = hrs + ":" + mins + ":" + secs;

  const currentDist = parseFloat(distance.value) || 0;
  const [targetDistance, limitHours] = brm.value.split(",").map(Number);

  globalPCList = parseTextList(pcInput.value, true);
  globalShopList = parseTextList(shopInput.value, false);

  let progressPct = (currentDist / targetDistance) * 100;
  if (progressPct < 0) progressPct = 0;
  if (progressPct > 100) progressPct = 100;
  graphBar.style.width = progressPct + "%";

  // PC自動追従
  let detectedPcIdx = globalPCList.length > 0 ? globalPCList.length - 1 : -1;
  for (let i = 0; i < globalPCList.length; i++) {
    if (globalPCList[i].dist > currentDist) { detectedPcIdx = i; break; }
  }
  pcAutoTrackIdx = detectedPcIdx;
  if (isDistanceOrInputChanged || !isPcUserNavigating || pcDisplayIdx === -1 || pcDisplayIdx >= globalPCList.length) {
    if (isDistanceOrInputChanged) { isPcUserNavigating = false; }
    pcDisplayIdx = pcAutoTrackIdx;
  }

  // コンビニ自動追従
  let detectedShopIdx = globalShopList.length > 0 ? globalShopList.length - 1 : -1;
  for (let i = 0; i < globalShopList.length; i++) {
    if (globalShopList[i].dist > currentDist) { detectedShopIdx = i; break; }
  }
  shopAutoTrackIdx = detectedShopIdx;
  if (isDistanceOrInputChanged || !isShopUserNavigating || shopDisplayIdx === -1 || shopDisplayIdx >= globalShopList.length) {
    if (isDistanceOrInputChanged) { isShopUserNavigating = false; }
    shopDisplayIdx = shopAutoTrackIdx;
  }

  // トラックインデックス確定後にスケールを描画して、該当のインデックスにactive用スタイルを付与
  renderGraphScale(targetDistance);
  updateDisplayOnly();

  // 走行計算処理
  if (!startTime.value || !distance.value) return;
  let start = new Date(startTime.value);
  let elapsed = (now - start) / 1000 / 3600;
  if (elapsed <= 0) return;

  const gross = currentDist / elapsed;
  const eh = Math.floor(elapsed);
  const em = Math.floor((elapsed - eh) * 60);
  document.getElementById("elapsed").innerText = eh + "時間" + em + "分";

  const totalRemainTime = limitHours - elapsed;
  if (totalRemainTime > 0) {
    const rth = Math.floor(totalRemainTime);
    const rtm = Math.floor((totalRemainTime - rth) * 60);
    document.getElementById("remainTime").innerText = rth + "時間" + rtm + "分";
  } else {
    document.getElementById("remainTime").innerText = "タイムアウト";
  }
  
  document.getElementById("gross").innerText = gross.toFixed(2) + " km/h";
  const remainDist = targetDistance - currentDist;
  document.getElementById("remainDistance").innerText = Math.max(0, remainDist).toFixed(1) + " km";

  const predictedHours = targetDistance / gross;
  const finishTime = new Date(start.getTime() + predictedHours * 3600000);
  const finishStr = finishTime.toLocaleDateString("ja-JP", { weekday: 'short', hour: '2-digit', minute: '2-digit' });
  document.getElementById("finish").innerText = finishStr;

  let need = (remainDist > 0 && totalRemainTime > 0) ? (remainDist / totalRemainTime).toFixed(1) + " km/h" : "---";
  document.getElementById("needSpeed").innerText = need;

  const saving = limitHours - predictedHours;
  const savSign = saving >= 0 ? "+" : "-";
  const savH = Math.floor(Math.abs(saving));
  const savM = Math.floor((Math.abs(saving) % 1) * 60);
  
  let statusIcon = "🔴";
  let statusClass = "big-value red"; 
  if (saving >= 2) { statusIcon = "🟢"; statusClass = "big-value green"; }
  else if (saving >= 1) { statusIcon = "🟡"; statusClass = "big-value yellow"; }

  const savingElement = document.getElementById("saving");
  savingElement.innerText = statusIcon + " " + savSign + savH + "時間" + savM + "分";
  savingElement.className = statusClass;
}

resetBtn.addEventListener("click", () => {
  if (confirm("すべての設定、リスト、走行データをリセットしますか？")) {
    localStorage.removeItem("startTime");
    localStorage.removeItem("distance");
    localStorage.removeItem("pcList3");
    localStorage.removeItem("shopList3");

    startTime.value = "";
    distance.value = "";
    pcInput.value = "";
    shopInput.value = "";
    saveName.value = "";
    tempDistanceValue = "";
    graphBar.style.width = "0%";

    document.getElementById("elapsed").innerText = "--";
    document.getElementById("remainTime").innerText = "--";
    document.getElementById("gross").innerText = "--";
    document.getElementById("remainDistance").innerText = "--";
    document.getElementById("finish").innerText = "--";
    document.getElementById("needSpeed").innerText = "--";
    document.getElementById("saving").innerText = "--";
    document.getElementById("saving").className = "big-value"; 
    
    isPcUserNavigating = false; 
    isShopUserNavigating = false;
    menuContent.classList.remove("open");
    update(true);
    alert("リセットが完了しました。");
  }
});

// 1秒ごとの定期アップデートでは、不要なグラフ再描画（チラつき）を防ぐため
// 距離や設定が変わった時（update(true)）のみ再描画をかける運用にしています
setInterval(() => update(false), 1000);
distance.addEventListener("input", () => update(true));
pcInput.addEventListener("input", () => update(true));
shopInput.addEventListener("input", () => update(true));
startTime.addEventListener("change", () => update(false));
brm.addEventListener("change", () => update(false));
document.addEventListener("resume", () => update(false), false);

loadSavedListsDropdown();
update(true);
</script>
