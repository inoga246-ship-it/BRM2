<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRM Pace Manager</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: #000;
  color: #fff;
  padding: 10px;
}
input, select, textarea {
  user-select: text !important;
  -webkit-user-select: text !important;
}
.container {
  max-width: 520px;
  margin: auto;
}

/* ヘッダー */
.header {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 8px 16px 8px;
  border-bottom: 1px solid #222; 
  margin-bottom: 10px;
}
.header-title {
  font-family: 'Arial Black', Impact, sans-serif; 
  font-size: 22px; 
  font-style: italic; 
  letter-spacing: 1px; 
  color: #ffffff; 
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  text-align: left;
  padding-right: 10px;
}
.menu-trigger {
  font-size: 24px;
  cursor: pointer;
  padding: 4px 8px;
  color: #ffffff; 
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  flex-shrink: 0;
}

/* メニューエリア */
.menu-content {
  display: none;
  background: #222;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 12px;
  border: 1px solid #444;
}
.menu-content.open {
  display: block;
}
.menu-label {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 5px;
  display: block;
}
textarea {
  width: 100%;
  background: #333;
  color: #fff;
  border: 1px solid #555;
  padding: 10px;
  font-size: 14px;
  border-radius: 4px;
  height: 110px;
}

/* メニュー内専用のボタン・入力欄スタイル */
.menu-input-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  margin-bottom: 12px;
}
.btn-save {
  background: #00aa66;
  color: white;
  border: none;
  padding: 0 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-delete {
  background: #444;
  color: #ff4444;
  border: 1px solid #ff4444;
  padding: 0 12px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-reset {
  width: 100%;
  background: #ff4444;
  color: white;
  border: none;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 6px;
  margin-top: 10px;
}

/* 共通カードスタイル */
.slim-card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px 12px; 
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.card-center {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.label-center {
  display: block;
  font-size: 13px;
  color: #bbb;
  margin-bottom: 3px;
  text-align: center;
}
.title {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 2px;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: #fff;
  text-align: center;
  text-align-last: center; 
}
input[type="datetime-local"] {
  font-size: 13px;
  padding: 11px 4px;
}

/* メニュー内用の行レイアウト */
.menu-top-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.half {
  flex: 1;
}

.current-time-display {
  font-size: 24px;
  font-weight: bold;
  color: #00e5ff; 
  text-align: center;
}
.value {
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}

/* 動く進捗グラフエリア */
.progress-section {
  background: #111;
  border-radius: 10px;
  padding: 10px 14px 4px 14px; 
  margin-bottom: 8px;
  border: 1px solid #222;
}
.graph-container {
  background-color: #222;
  border-radius: 4px;
  height: 14px;
  width: 100%;
  overflow: hidden;
  position: relative;
}
.graph-bar {
  height: 100%;
  width: 0%; 
  background: linear-gradient(90deg, #00aa66 0%, #00ff66 100%);
  border-radius: 4px;
  transition: width 0.4s ease-out;
}
.graph-scale-container {
  position: relative;
  width: 100%;
  height: 34px;
}
.scale-point {
  font-size: 10px;
  color: #ffffff; 
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
}

/* 奇数用（上段）の配置スタイル */
.scale-point.odd {
  top: 5px;
}
.scale-point.odd::before {
  content: "";
  position: absolute;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 4px;
  background-color: #ffffff;
}

/* 偶数用（下段）の配置スタイル */
.scale-point.even {
  top: 18px;
}
.scale-point.even::before {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 17px; 
  background-color: #ffffff;
}

/* PC情報枠 */
.full-width-pc-card {
  width: 100%;
  background: #0a192f;      
  border: 1px solid #00d2ff; 
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}
.pc-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.pc-nav-btn {
  background: #113355;
  color: #00d2ff;
  border: 1px solid #00d2ff;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.pc-nav-btn:active {
  background: #00d2ff;
  color: #000;
}
.pc-title-label {
  color: #00d2ff;            
  font-size: 15px;           
  font-weight: bold;
  line-height: 1.3;
  text-align: center;
  flex: 1;
  padding: 0 4px;
}
.pc-main-row {
  display: flex;
  justify-content: center; 
  align-items: baseline;
  margin-bottom: 10px;
  border-bottom: 1px dashed rgba(0, 210, 255, 0.3);
  padding-bottom: 6px;
}

/* 速度グリッド */
.pc-speed-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); 
  gap: 8px 4px; 
  text-align: center;
}
.pc-speed-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.pc-speed-th {
  font-size: 13px; 
  color: #00d2ff;
  font-weight: normal;
  margin-bottom: 2px;
}
.pc-speed-td {
  font-size: 16px; 
  font-weight: bold;
  color: #ffffff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

/* 貯金時間 */
.slim-big-card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px 12px; 
  margin-top: 4px;
}
.big-value {
  font-size: 38px; 
  font-weight: bold;
  text-align: center;
  margin-top: 2px;
  display: block;
  width: 100%;
}

/* フッター */
.footer {
  margin-top: 25px;
  margin-bottom: 15px;
  text-align: center;
  font-size: 12px;
  color: #666;
  letter-spacing: 0.5px;
}

/* 強調色 */
.green { color: #00ff66; }
.yellow { color: #ffcc00; }
.red { color: #ff4444; }
.highlight { color: #ffff00; } 
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">BRM PACE MANAGER</div>
    <div class="menu-trigger" id="menuTrigger">☰</div>
  </div>

  <div class="menu-content" id="menuContent">
    <div class="menu-top-row">
      <div class="card-center half" style="background: #333;">
        <label class="label-center" style="color: #fff;">BRM設定</label>
        <select id="brm" style="background: #222;">
          <option value="200,13.5">200km (13.5h)</option>
          <option value="300,20">300km (20h)</option>
          <option value="400,27">400km (27h)</option>
          <option value="600,40">600km (40h)</option>
        </select>
      </div>
      <div class="card-center half" style="background: #333;">
        <label class="label-center" style="color: #fff;">START日時</label>
        <input type="datetime-local" id="startTime" style="background: #222;">
      </div>
    </div>

    <div style="margin-bottom: 8px;">
      <label class="menu-label">PCリスト登録 (貼り付け用)</label>
      <textarea id="pcInput" placeholder="例:&#10;PC1, 御幸橋① フォト, 24.9km&#10;PC2、山城大橋 フォト，38.0km"></textarea>
    </div>

    <div style="margin-bottom: 10px;">
      <label class="menu-label">現在のリストを保存する</label>
      <div class="menu-input-row">
        <input type="text" id="saveName" placeholder="例: BRM315泉佐野" style="font-size:14px; padding:6px; text-align:left;">
        <button class="btn-save" id="saveBtn">保存</button>
      </div>
    </div>

    <div style="margin-bottom: 15px;">
      <label class="menu-label">保存済みリストの呼び出し / 削除</label>
      <div class="menu-input-row">
        <select id="savedListsSelect" style="font-size:14px; padding:6px; text-align:left; text-align-last:left;">
          <option value="">-- 保存データがありません --</option>
        </select>
        <button class="btn-delete" id="deleteBtn">削除</button>
      </div>
    </div>

    <button class="btn-reset" id="resetBtn">リセット</button>
  </div>

  <div class="grid">
    <div class="slim-card">
      <div class="title">現在距離</div>
      <input type="number" id="distance" step="0.1" inputmode="decimal" style="font-size:24px; color:#00ff66; padding: 2px; text-align: center; background: transparent;">
    </div>
    <div class="slim-card">
      <div class="title">現在時間</div>
      <div id="currentTime" class="current-time-display">--:--:--</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="graph-container">
      <div id="graphBar" class="graph-bar"></div>
    </div>
    <div class="graph-scale-container" id="graphScale">
      </div>
  </div>

  <div class="card full-width-pc-card" id="pcCard">
    <div class="pc-header-row">
      <button class="pc-nav-btn" id="pcPrevBtn">◀ 前</button>
      <div id="pcLabel" class="pc-title-label">NEXT: PC-</div>
      <button class="pc-nav-btn" id="pcNextBtn">次 ▶</button>
    </div>
    
    <div class="pc-main-row">
      <div class="value highlight" id="pcRemainDist" style="font-size:26px; text-align: center; cursor: pointer; padding: 0 20px;">残り -- km</div>
    </div>
    
    <div class="pc-speed-grid">
      <div class="pc-speed-cell"><div class="pc-speed-th">15km/h</div><div class="pc-speed-td" id="sp15">--:--</div></div>
      <div class="pc-speed-cell"><div class="pc-speed-th">16km/h</div><div class="pc-speed-td" id="sp16">--:--</div></div>
      <div class="pc-speed-cell"><div class="pc-speed-th">17km/h</div><div class="pc-speed-td" id="sp17">--:--</div></div>
      <div class="pc-speed-cell"><div class="pc-speed-th">18km/h</div><div class="pc-speed-td" id="sp18">--:--</div></div>
      <div class="pc-speed-cell"><div class="pc-speed-th">19km/h</div><div class="pc-speed-td" id="sp19">--:--</div></div>
      <div class="pc-speed-cell"><div class="pc-speed-th">20km/h</div><div class="pc-speed-td" id="sp20">--:--</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="slim-card"><div class="title">経過時間</div><div class="value" id="elapsed">--</div></div>
    <div class="slim-card"><div class="title">残り時間</div><div class="value" id="remainTime">--</div></div>
    <div class="slim-card"><div class="title">グロス速度</div><div class="value" id="gross">--</div></div>
    <div class="slim-card"><div class="title">残り距離</div><div class="value" id="remainDistance">--</div></div>
    <div class="slim-card"><div class="title">完走予想</div><div class="value" id="finish">--</div></div>
    <div class="slim-card"><div class="title">必要平均</div><div class="value" id="needSpeed">--</div></div>
  </div>

  <div class="slim-big-card">
    <div class="title" style="font-size: 15px;">貯金時間</div>
    <div class="big-value" id="saving">--</div>
  </div>

  <div class="footer">
    © 2026 Developed by HIRAI
  </div>

</div>

<script>
const brm = document.getElementById("brm");
const startTime = document.getElementById("startTime");
const distance = document.getElementById("distance");
const pcInput = document.getElementById("pcInput");
const menuTrigger = document.getElementById("menuTrigger");
const menuContent = document.getElementById("menuContent");
const resetBtn = document.getElementById("resetBtn");
const pcPrevBtn = document.getElementById("pcPrevBtn");
const pcNextBtn = document.getElementById("pcNextBtn");
const pcRemainDist = document.getElementById("pcRemainDist");
const graphBar = document.getElementById("graphBar");
const graphScale = document.getElementById("graphScale");

const saveName = document.getElementById("saveName");
const saveBtn = document.getElementById("saveBtn");
const savedListsSelect = document.getElementById("savedListsSelect");
const deleteBtn = document.getElementById("deleteBtn");

const defaultPCList = "PC1, 御幸橋① フォト, 24.9km\nPC2, 山城大橋 フォト, 38.0km";

let globalPCList = [];
let currentDisplayIndex = -1; 
let autoTrackIdx = -1;        
let isUserNavigating = false; 
let tempDistanceValue = ""; 

startTime.value = localStorage.getItem("startTime") || "";
brm.value = localStorage.getItem("brm") || "200,13.5";
distance.value = localStorage.getItem("distance") || "";
pcInput.value = localStorage.getItem("pcList") || defaultPCList;

menuTrigger.addEventListener("click", () => menuContent.classList.toggle("open"));

distance.addEventListener("focus", () => {
  tempDistanceValue = distance.value; 
  distance.value = ""; 
});

distance.addEventListener("blur", () => {
  if (distance.value === "") {
    distance.value = tempDistanceValue;
    update(false);
  }
});

pcRemainDist.addEventListener("dblclick", () => {
  if (isUserNavigating) {
    isUserNavigating = false; 
    currentDisplayIndex = autoTrackIdx; 
    updateDisplayOnly();
  }
});

function loadSavedListsDropdown() {
  const savedData = localStorage.getItem("customPCLists");
  let lists = savedData ? JSON.parse(savedData) : {};
  
  savedListsSelect.innerHTML = "";
  
  const keys = Object.keys(lists);
  if (keys.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.innerText = "-- 保存データがありません --";
    savedListsSelect.appendChild(opt);
    return;
  }
  
  const defaultOpt = document.createElement("option");
  defaultOpt.value = "";
  defaultOpt.innerText = "-- リストを選択して呼び出し --";
  savedListsSelect.appendChild(defaultOpt);
  
  keys.forEach(key => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.innerText = key;
    savedListsSelect.appendChild(opt);
  });
}

saveBtn.addEventListener("click", () => {
  const name = saveName.value.trim();
  const text = pcInput.value.trim();
  
  if (!name) {
    alert("保存する名前を入力してください。");
    return;
  }
  if (!text) {
    alert("保存するPCリストの中身が空です。");
    return;
  }
  
  const savedData = localStorage.getItem("customPCLists");
  let lists = savedData ? JSON.parse(savedData) : {};
  
  lists[name] = text;
  localStorage.setItem("customPCLists", JSON.stringify(lists));
  
  saveName.value = ""; 
  loadSavedListsDropdown(); 
  alert("リスト「" + name + "」を保存しました。");
});

savedListsSelect.addEventListener("change", () => {
  const selectedName = savedListsSelect.value;
  if (!selectedName) return;
  
  const savedData = localStorage.getItem("customPCLists");
  let lists = savedData ? JSON.parse(savedData) : {};
  
  if (lists[selectedName]) {
    pcInput.value = lists[selectedName];
    isUserNavigating = false; 
    update(true); 
    alert("「" + selectedName + "」のリストを読み込みました。");
  }
});

deleteBtn.addEventListener("click", () => {
  const selectedName = savedListsSelect.value;
  if (!selectedName) {
    alert("削除したいリストを選択してください。");
    return;
  }
  
  if (confirm("リスト「" + selectedName + "」を削除してもよろしいですか？")) {
    const savedData = localStorage.getItem("customPCLists");
    let lists = savedData ? JSON.parse(savedData) : {};
    
    delete lists[selectedName];
    localStorage.setItem("customPCLists", JSON.stringify(lists));
    
    loadSavedListsDropdown(); 
    alert("削除しました。");
  }
});

pcPrevBtn.addEventListener("click", (e) => {
  if (globalPCList.length === 0) return;
  if (currentDisplayIndex > 0) {
    isUserNavigating = true; 
    currentDisplayIndex--;
    updateDisplayOnly();
  }
});

pcNextBtn.addEventListener("click", (e) => {
  if (globalPCList.length === 0) return;
  if (currentDisplayIndex < globalPCList.length - 1) {
    isUserNavigating = true; 
    currentDisplayIndex++;
    updateDisplayOnly();
  }
});

function formatArrivalDate(targetDate, startStr) {
  if (!startStr) return "--:--";
  const start = new Date(startStr);
  
  const hrs = String(targetDate.getHours()).padStart(2, '0');
  const mins = String(targetDate.getMinutes()).padStart(2, '0');
  
  const isNextDay = targetDate.getDate() !== start.getDate() || targetDate.getMonth() !== start.getMonth();
  
  if (isNextDay) {
    const dayLabels = ["日", "月", "火", "水", "木", "金", "土"];
    return dayLabels[targetDate.getDay()] + ")" + hrs + ":" + mins;
  }
  return hrs + ":" + mins;
}

function updateDisplayOnly() {
  if (globalPCList.length === 0 || currentDisplayIndex === -1) return;
  
  const selectedPC = globalPCList[currentDisplayIndex];
  const currentDist = parseFloat(distance.value) || 0;
  const diffDist = selectedPC.dist - currentDist;

  let prefix = "";
  if (currentDisplayIndex === autoTrackIdx) {
    prefix = "NEXT: ";
  } else if (currentDisplayIndex < autoTrackIdx) {
    prefix = "通過済: ";
  } else {
    prefix = "先々: ";
  }

  document.getElementById("pcLabel").innerText = prefix + selectedPC.id + " " + selectedPC.name + "（" + selectedPC.dist.toFixed(1) + "km）";

  if (diffDist >= 0) {
    pcRemainDist.innerText = "残り " + diffDist.toFixed(1) + " km";
  } else {
    pcRemainDist.innerText = "通過後 " + Math.abs(diffDist).toFixed(1) + " km";
  }

  let startReady = false;
  let start = null;
  if (startTime.value) {
    start = new Date(startTime.value);
    if (!isNaN(start.getTime())) startReady = true;
  }

  if (startReady) {
    const speeds = [15, 16, 17, 18, 19, 20];
    speeds.forEach(speed => {
      const totalHoursFromStart = selectedPC.dist / speed;
      const arrivalDate = new Date(start.getTime() + totalHoursFromStart * 3600000);
      document.getElementById("sp" + speed).innerText = formatArrivalDate(arrivalDate, startTime.value);
    });
  } else {
    ["15","16","17","18","19","20"].forEach(s => document.getElementById("sp" + s).innerText = "--:--");
  }
}

// 千鳥配置に対応したグラフ目盛りレンダリング関数
function renderGraphScale(targetDistance) {
  graphScale.innerHTML = ""; 
  
  // スタート地点 (0km)
  createScalePoint(0, "START", true);

  // PC以外のチェックポイントに割り当てる丸数字用のカウンター
  const circleNumbers = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];
  let nonPcCount = 0;

  // 各PC地点をループ
  globalPCList.forEach((pc, index) => {
    if (pc.dist < targetDistance) {
      const pct = (pc.dist / targetDistance) * 100;
      const isOdd = (index % 2 === 0);
      
      // 文字列（id または name）に「PC」が含まれているか正規表現でチェック
      const isPcType = /PC/i.test(pc.id) || /PC/i.test(pc.name);
      
      let displayLabel = "";
      if (isPcType) {
        // 【修正】「PC」が含まれる場合は「PC1」「PC2」「PC10」のように数字部分までを抽出して止める
        // id（PC1、PC2等）から英字の「PC」とそれに続く数字だけを取り出す
        const match = pc.id.match(/PC\d+/i);
        displayLabel = match ? match[0].toUpperCase() : pc.id;
      } else {
        // PC以外の通過チェックやフォトの場合は、丸数字（①、②…）を割り当てる
        displayLabel = circleNumbers[nonPcCount] || `(${nonPcCount + 1})`;
        nonPcCount++;
      }
      
      createScalePoint(pct, displayLabel, isOdd);
    }
  });

  // ゴール地点 (MAX km)
  createScalePoint(100, "GOAL", false);
}

function createScalePoint(leftPct, label, isOdd) {
  const div = document.createElement("div");
  div.className = "scale-point " + (isOdd ? "odd" : "even");
  div.style.left = leftPct + "%";
  div.innerText = label;
  graphScale.appendChild(div);
}

function update(isDistanceOrInputChanged = false) {
  localStorage.setItem("startTime", startTime.value);
  localStorage.setItem("brm", brm.value);
  localStorage.setItem("distance", distance.value);
  localStorage.setItem("pcList", pcInput.value);

  const now = new Date();
  const hrs = String(now.getHours()).padStart(2, '0');
  const mins = String(now.getMinutes()).padStart(2, '0');
  const secs = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("currentTime").innerText = hrs + ":" + mins + ":" + secs;

  let startReady = false;
  let start = null;
  if (startTime.value) {
    start = new Date(startTime.value);
    if (!isNaN(start.getTime())) startReady = true;
  }

  const currentDist = parseFloat(distance.value) || 0;
  const [targetDistance, limitHours] = brm.value.split(",").map(Number);

  const pcLines = pcInput.value.split("\n").filter(line => line.trim() !== "");
  globalPCList = [];
  
  for (let line of pcLines) {
    const columns = line.split(/[,,、，]/).map(c => c.trim());
    if (columns.length < 3) continue;
    const pcDist = parseFloat(columns[2].replace(/[^\d.]/g, ""));
    if (!isNaN(pcDist)) {
      globalPCList.push({ id: columns[0], name: columns[1], dist: pcDist });
    }
  }

  let progressPct = (currentDist / targetDistance) * 100;
  if (progressPct < 0) progressPct = 0;
  if (progressPct > 100) progressPct = 100;
  graphBar.style.width = progressPct + "%";

  renderGraphScale(targetDistance);

  let detectedTrackIdx = globalPCList.length > 0 ? globalPCList.length - 1 : -1;
  for (let i = 0; i < globalPCList.length; i++) {
    if (globalPCList[i].dist > currentDist) {
      detectedTrackIdx = i;
      break;
    }
  }
  
  autoTrackIdx = detectedTrackIdx;

  if (isDistanceOrInputChanged || !isUserNavigating || currentDisplayIndex === -1 || currentDisplayIndex >= globalPCList.length) {
    if (isDistanceOrInputChanged) {
      isUserNavigating = false; 
    }
    currentDisplayIndex = autoTrackIdx;
  }

  if (globalPCList.length > 0 && currentDisplayIndex !== -1) {
    updateDisplayOnly();
  } else {
    document.getElementById("pcLabel").innerText = "NEXT: GOAL";
    pcRemainDist.innerText = "残り 0.0 km";
    ["15","16","17","18","19","20"].forEach(s => document.getElementById("sp" + s).innerText = "--:--");
  }

  if (!startTime.value || !distance.value) return;

  let elapsed = (now - start) / 1000 / 3600;
  if (elapsed <= 0) return;

  const gross = currentDist / elapsed;

  const eh = Math.floor(elapsed);
  const em = Math.floor((elapsed - eh) * 60);
  document.getElementById("elapsed").innerText = eh + "時間" + em + "分";

  const totalRemainTime = limitHours - elapsed;
  if (totalRemainTime > 0) {
    const rth = Math.floor(totalRemainTime);
    const rtm = Math.floor((totalRemainTime - rth) * 60);
    document.getElementById("remainTime").innerText = rth + "時間" + rtm + "分";
  } else {
    document.getElementById("remainTime").innerText = "タイムアウト";
  }
  
  document.getElementById("gross").innerText = gross.toFixed(2) + " km/h";
  
  const remainDist = targetDistance - currentDist;
  document.getElementById("remainDistance").innerText = Math.max(0, remainDist).toFixed(1) + " km";

  const predictedHours = targetDistance / gross;
  const finishTime = new Date(start.getTime() + predictedHours * 3600000);
  const finishStr = finishTime.toLocaleDateString("ja-JP", { weekday: 'short', hour: '2-digit', minute: '2-digit' });
  document.getElementById("finish").innerText = finishStr;

  let need = (remainDist > 0 && totalRemainTime > 0) ? (remainDist / totalRemainTime).toFixed(1) + " km/h" : "---";
  document.getElementById("needSpeed").innerText = need;

  const saving = limitHours - predictedHours;
  const savSign = saving >= 0 ? "+" : "-";
  const savH = Math.floor(Math.abs(saving));
  const savM = Math.floor((Math.abs(saving) % 1) * 60);
  
  let statusIcon = "🔴";
  let statusClass = "big-value red"; 
  if (saving >= 2) {
    statusIcon = "🟢";
    statusClass = "big-value green";
  } else if (saving >= 1) {
    statusIcon = "🟡";
    statusClass = "big-value yellow";
  }

  const savingElement = document.getElementById("saving");
  savingElement.innerText = statusIcon + " " + savSign + savH + "時間" + savM + "分";
  savingElement.className = statusClass;
}

resetBtn.addEventListener("click", () => {
  if (confirm("「START日時」「現在距離」「PCリスト登録」の内容をリセットしますか？（※保存したリスト一覧は削除されません）")) {
    
    localStorage.removeItem("startTime");
    localStorage.removeItem("distance");
    localStorage.removeItem("pcList");

    startTime.value = "";
    distance.value = "";
    pcInput.value = "";
    saveName.value = "";
    tempDistanceValue = "";
    graphBar.style.width = "0%";

    document.getElementById("elapsed").innerText = "--";
    document.getElementById("remainTime").innerText = "--";
    document.getElementById("gross").innerText = "--";
    document.getElementById("remainDistance").innerText = "--";
    document.getElementById("finish").innerText = "--";
    document.getElementById("needSpeed").innerText = "--";
    document.getElementById("saving").innerText = "--";
    document.getElementById("saving").className = "big-value"; 
    document.getElementById("pcLabel").innerText = "NEXT: PC-";
    pcRemainDist.innerText = "残り -- km";
    
    ["15","16","17","18","19","20"].forEach(s => document.getElementById("sp" + s).innerText = "--:--");

    savedListsSelect.value = "";

    isUserNavigating = false; 
    menuContent.classList.remove("open");
    update(true);
    alert("指定された項目をリセットしました。");
  }
});

setInterval(() => update(false), 1000);
distance.addEventListener("input", () => update(true));
pcInput.addEventListener("input", () => update(true));
startTime.addEventListener("change", () => update(false));
brm.addEventListener("change", () => update(false));
document.addEventListener("resume", () => update(false), false);

loadSavedListsDropdown();
update(true);
</script>
</body>
</html>
